name: Release

# Publishes the .rbz to a GitHub Release. Two ways to trigger:
#   1. Push a version tag:   git tag v1.0.0 && git push origin v1.0.0
#   2. Manual dispatch:      Actions -> Release -> Run workflow (enter a tag)
# The manual path also creates the tag, so it works even where tag pushes are
# restricted.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run tests
        run: ruby tools/test_logic.rb

      - name: Build .rbz
        run: ./tools/build_rbz.sh

      - name: Create GitHub Release with .rbz
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: SKP E-Plumb ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/SKP-E-Plumb.rbz
            dist/SKP-E-Plumb-*.rbz
          generate_release_notes: true
