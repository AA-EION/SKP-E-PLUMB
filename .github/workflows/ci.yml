name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Syntax check all Ruby files
        run: |
          set -e
          for f in skp_e_plumb.rb skp_e_plumb/*.rb tools/*.rb; do
            echo "checking $f"
            ruby -c "$f"
          done

      - name: Run offline logic tests
        run: ruby tools/test_logic.rb

      - name: Build .rbz
        run: ./tools/build_rbz.sh

      - name: Upload .rbz artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKP-E-Plumb-rbz
          path: dist/*.rbz
